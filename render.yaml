services:
  - type: web
    name: hive-mcp-insurance-broker
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: HIVE_BASE
        value: https://hivemorph.onrender.com
